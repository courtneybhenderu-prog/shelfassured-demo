<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands - ShelfAssured</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.5/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <!-- Header -->
        <div class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center">
                        <h1 class="text-2xl font-bold text-gray-900">Brands</h1>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="user-info" class="text-sm text-gray-600">Loading...</span>
                        <button onclick="handleSignOut()" class="text-sm text-gray-500 hover:text-gray-700">Sign Out</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Search and Filters -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-1">
                        <input type="text" id="brand-search" placeholder="Search brands by name or website..." 
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="text-sm text-gray-500 flex items-center">
                        <span id="brand-count">Loading...</span>
                    </div>
                </div>
            </div>

            <!-- Brands List -->
            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-medium text-gray-900">All Brands</h3>
                </div>
                <div id="brands-list" class="p-6">
                    <div class="text-center text-gray-500">Loading brands...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Include shared API -->
    <script src="../config.js"></script>
    <script src="../shared/api.js?v=20260305"></script>
    
    <script>
        // Declare variables
        let currentUser_brands = null;
        let userProfile_brands = null;
        let allBrandsList = [];

        // Initialize page
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🔧 Brands page initialized');
            
            // Wait for Supabase to be available
            let attempts = 0;
            while (!window.supabase && attempts < 10) {
                console.log('⏳ Waiting for Supabase to load...', attempts);
                await new Promise(resolve => setTimeout(resolve, 100));
                attempts++;
            }
            
            if (!window.supabase) {
                console.error('❌ Supabase failed to load');
                window.location.href = '../auth/signin.html';
                return;
            }
            
            await checkUserAccess();
        });

        // Check if user is authenticated
        async function checkUserAccess() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                
                if (!user) {
                    alert('Please sign in to access this page');
                    window.location.href = '../auth/signin.html';
                    return;
                }

                // Get user profile
                const { data: profile, error } = await supabase
                    .from('users')
                    .select('role, full_name')
                    .eq('id', user.id)
                    .single();

                if (error || !profile) {
                    console.error('Error fetching user profile:', error);
                    alert('Error loading user profile');
                    window.location.href = '../auth/signin.html';
                    return;
                }

                currentUser_brands = user;
                userProfile_brands = profile;
                document.getElementById('user-info').textContent = `Welcome, ${profile.full_name || user.email}`;
                console.log('✅ User access confirmed');
                
                // Load brands
                await loadBrands();
                
            } catch (error) {
                console.error('Error checking user access:', error);
                alert('Error checking permissions');
                window.location.href = '../auth/signin.html';
            }
        }

        // Load brands
        async function loadBrands() {
            try {
                console.log('🔄 Loading brands...');
                const container = document.getElementById('brands-list');
                if (!container) {
                    console.error('❌ Brands container not found');
                    return;
                }
                
                const { data: brands, error } = await supabase
                    .from('brands')
                    .select('id, name, website, created_at, logo_url, description, contact_email, contact_phone, primary_email, phone, address')
                    .order('created_at', { ascending: false })
                    .limit(100);
                
                console.log('📊 Brands query result:', { data: brands, error: error });
                
                if (error) {
                    console.error('❌ Error loading brands:', error);
                    container.innerHTML = '<div class="text-center text-red-500 py-8">Error loading brands. Please check the console and refresh the page.</div>';
                    return;
                }
                
                allBrandsList = brands || [];
                console.log('✅ Brands loaded:', allBrandsList.length);
                
                if (allBrandsList.length === 0) {
                    console.warn('⚠️ No brands returned from query');
                    container.innerHTML = '<div class="text-center text-gray-500 py-8">No brands found in database</div>';
                    return;
                }
                
                displayBrands(allBrandsList);
                setupSearch();
                
            } catch (error) {
                console.error('❌ Exception loading brands:', error);
                console.error('Exception stack:', error.stack);
                const container = document.getElementById('brands-list');
                if (container) {
                    container.innerHTML = '<div class="text-center text-red-500 py-8">Error loading brands. Please refresh the page.</div>';
                }
            }
        }

        // Display brands
        function displayBrands(brands) {
            const container = document.getElementById('brands-list');
            const countElement = document.getElementById('brand-count');
            
            if (!container) {
                console.error('❌ Brands container not found');
                return;
            }
            
            if (countElement) {
                countElement.textContent = `${brands.length} brand${brands.length !== 1 ? 's' : ''}`;
            }
            
            if (brands.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">No brands found</div>';
                return;
            }

            console.log(`🎨 Displaying ${brands.length} brands in UI`);
            
            const brandsHtml = brands.map(brand => {
                let logoHtml;
                if (brand.logo_url) {
                    // Fix URL encoding issues (spaces, etc.)
                    let logoUrl = brand.logo_url;
                    // Check if URL has unencoded spaces in bucket name path
                    if (logoUrl.includes('/brand logos/')) {
                        logoUrl = logoUrl.replace('/brand logos/', '/brand_logos/');
                    }
                    // Encode any remaining spaces in the URL
                    logoUrl = encodeURI(logoUrl);
                    
                    // Create image with error handling
                    const brandId = brand.id;
                    logoHtml = `<img src="${escapeHtml(logoUrl)}" alt="${escapeHtml(brand.name)} logo" 
                         class="w-16 h-16 object-contain rounded border border-gray-200 bg-white p-1"
                         loading="lazy"
                         data-brand-id="${brandId}"
                         onerror="handleLogoError(this)">`;
                } else {
                    logoHtml = `<div class="w-16 h-16 flex items-center justify-center bg-gray-100 rounded border border-gray-200 text-gray-400 text-xs">No Logo</div>`;
                }
                
                // Build contact info
                const contactEmail = brand.contact_email || brand.primary_email || '';
                const contactPhone = brand.contact_phone || brand.phone || '';
                const contactInfo = [];
                if (contactEmail) contactInfo.push(`Email: ${contactEmail}`);
                if (contactPhone) contactInfo.push(`Phone: ${contactPhone}`);
                
                return `
                <div class="py-4 border-b border-gray-200 last:border-b-0 hover:bg-gray-50 transition-colors">
                    <div class="flex items-start justify-between">
                        <div class="flex items-start space-x-4 flex-1">
                            ${logoHtml}
                            <div class="flex-1">
                                <a href="brand-client.html?brand_id=${brand.id}" class="font-medium text-blue-600 hover:text-blue-800 hover:underline text-lg">
                                    ${escapeHtml(brand.name || 'Unnamed Brand')}
                                </a>
                                ${brand.description ? `<div class="text-sm text-gray-600 mt-1">${escapeHtml(brand.description)}</div>` : ''}
                                ${brand.website ? `<div class="text-sm text-gray-500 mt-1">
                                    <a href="${escapeHtml(brand.website)}" target="_blank" rel="noopener" class="text-blue-600 hover:underline">${escapeHtml(brand.website)}</a>
                                </div>` : ''}
                                ${contactInfo.length > 0 ? `<div class="text-sm text-gray-500 mt-1">${contactInfo.join(' · ')}</div>` : ''}
                                ${brand.address ? `<div class="text-sm text-gray-500 mt-1">${escapeHtml(brand.address)}</div>` : ''}
                                <div class="text-xs text-gray-400 mt-1">Created: ${brand.created_at ? new Date(brand.created_at).toLocaleDateString() : 'N/A'}</div>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2 ml-4">
                            <a href="brand-client.html?brand_id=${brand.id}" 
                               class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium text-sm">
                                View Dashboard
                            </a>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            container.innerHTML = brandsHtml;
        }

        // Setup search functionality
        function setupSearch() {
            const searchInput = document.getElementById('brand-search');
            if (!searchInput) {
                console.warn('⚠️ Search input not found');
                return;
            }
            
            searchInput.addEventListener('input', function(e) {
                const term = e.target.value.toLowerCase().trim();
                console.log('🔍 Search term:', term);
                
                const filtered = term ? allBrandsList.filter(b => {
                    const nameMatch = (b.name || '').toLowerCase().includes(term);
                    const websiteMatch = (b.website || '').toLowerCase().includes(term);
                    const descMatch = (b.description || '').toLowerCase().includes(term);
                    const emailMatch = ((b.contact_email || '') + (b.primary_email || '')).toLowerCase().includes(term);
                    return nameMatch || websiteMatch || descMatch || emailMatch;
                }) : allBrandsList;
                
                console.log('✅ Filtered to', filtered.length, 'brands');
                displayBrands(filtered);
            });
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Handle logo load errors
        function handleLogoError(img) {
            img.onerror = null;
            console.error('❌ Logo failed to load for brand:', img.dataset.brandId);
            img.style.display = 'none';
            const placeholder = document.createElement('div');
            placeholder.className = 'w-16 h-16 flex items-center justify-center bg-gray-100 rounded border border-gray-200 text-gray-400 text-xs';
            placeholder.textContent = 'No Logo';
            if (img.parentNode) {
                img.parentNode.insertBefore(placeholder, img);
            }
        }
        
        // Make it globally accessible
        window.handleLogoError = handleLogoError;

        // Handle sign out
        async function handleSignOut() {
            try {
                await supabase.auth.signOut();
                window.location.href = '../auth/signin.html';
            } catch (error) {
                console.error('Error signing out:', error);
                window.location.href = '../auth/signin.html';
            }
        }

        // Define goToPage function
        function goToPage(page) {
            console.log('🔍 Debug: goToPage called with:', page);
            window.location.href = page;
        }
        
        // Make it globally available
        window.goToPage = goToPage;
        window.handleSignOut = handleSignOut;
    </script>

    <!-- Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200">
        <div class="flex justify-around py-3">
            <button onclick="goToPage('brand-client.html')" class="text-gray-500 hover:text-gray-700">Dashboard</button>
            <button onclick="goToPage('jobs.html')" class="text-gray-500 hover:text-gray-700">Jobs</button>
            <button class="font-bold text-[#C62828]">Brands</button>
            <button onclick="goToPage('profile.html')" class="text-gray-500 hover:text-gray-700">Profile</button>
        </div>
    </div>
</body>
</html>
