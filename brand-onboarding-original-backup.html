<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShelfAssured - Brand Onboarding</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />`n  <link rel="stylesheet" href="./shared/styles.css" />
  <style>
    *{box-sizing:border-box}
    .grid > div{min-width:0}
    input,select,textarea{background:#fff;line-height:1.4}
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --border:#e5e7eb;
      --text:var(--sa-text);
      --muted:#6b7280;
      --accent:var(--sa-text);
      --accent-2:#6b7280;
      --success:#065f46;
      --danger:#b91c1c;
      --brand:var(--sa-red);
    }
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif;margin:24px;background:var(--bg);color:var(--text)}
    .wrap{max-width:1050px;margin:0 auto;padding-bottom:80px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.04);padding:16px;margin-bottom:16px}
    h1{font-size:22px;margin:0 0 8px}
    h2{font-size:16px;margin:0 0 4px}
    h3{font-size:14px;margin:0 0 4px}
    .hint{color:var(--muted);font-size:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .full{grid-column:1 / -1}
    label{font-size:12px;font-weight:600;margin-bottom:6px;display:block}
    label .req{color:var(--danger)}
    input,select,textarea{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:12px}
    textarea{min-height:84px}
    .row{display:flex;gap:8px;align-items:center}
    .btn{background:var(--accent);color:#fff;border:0;border-radius:12px;padding:10px 14px;cursor:pointer}
    .btn.alt{background:var(--accent-2)}
    .btn.ghost{background:#fff;color:var(--text);border:1px solid var(--border)}
    .btn.primary{background:var(--brand)}
    .pill{border:1px dashed var(--border);border-radius:12px;padding:12px}
    .list{display:flex;flex-direction:column;gap:12px}
    .kpi{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .err{color:var(--danger);font-size:13px}
    .ok{color:var(--success);font-size:13px}
    code.small{font-size:11px;color:var(--muted)}
    .stepper{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .step{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:#fff;font-size:12px;color:var(--muted)}
    .step.active{border-color:var(--brand);color:var(--text);background:#eff6ff}
    .step .dot{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#e5e7eb;font-size:11px;color:#374151}
    .step.active .dot{background:var(--brand);color:#fff}
    .sticky-footer{position:fixed;bottom:0;left:0;right:0;background:#ffffff;border-top:1px solid var(--border);padding:12px 16px;display:flex;justify-content:center;z-index:50}
    .sticky-inner{width:100%;max-width:1050px;display:flex;gap:8px;align-items:center;justify-content:space-between}
    .summary{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
    .badge{padding:4px 8px;border-radius:999px;border:1px solid var(--border);background:#f9fafb}
    .section-title{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .section-actions{display:flex;gap:6px;flex-wrap:wrap}
    .inline-error{margin-top:6px;color:var(--danger);font-size:12px}
    .field-error input,.field-error textarea{border-color:#fca5a5;background:#fef2f2}
    .panel{padding:12px;border-radius:12px;background:#f9fafb;border:1px solid #e5e7eb}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:100}
    .modal.open{display:flex}
    .modal-card{background:#fff;border-radius:14px;max-width:900px;width:95%;max-height:80vh;overflow:auto;border:1px solid var(--border);padding:16px}
    .table{width:100%;border-collapse:collapse;font-size:12px}
    .table th,.table td{border-bottom:1px solid var(--border);padding:6px 8px;text-align:left}
    @media (max-width: 720px){
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
      .sticky-inner{flex-direction:column;align-items:stretch}
      .section-actions{width:100%}
      .section-actions .btn{flex:1}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Brand Onboarding</h1>
    <p class="hint">Fast setup for real-time shelf visibility. Takes ~5-10 minutes.</p>

    <div id="msg" class="hint"></div>

    <div class="stepper" id="stepper">
      <div class="step active" data-step="1"><span class="dot">1</span> Brand Info</div>
      <div class="step" data-step="2"><span class="dot">2</span> Products</div>
      <div class="step" data-step="3"><span class="dot">3</span> Stores</div>
    </div>

    <form id="form" class="card">
      <div id="step-1">
        <h2>Your Brand</h2>
        <div class="grid">
          <div>
            <label>Brand Name <span class="req">*</span></label>
            <input id="brand_name" placeholder="Full Business Name" required />
            <div class="inline-error" data-err="brand_name"></div>
          </div>
          <div>
            <label>Website</label>
            <input id="brand_site" placeholder="https://www.company.com" />
          </div>
          <div>
            <label>Primary Email</label>
            <input id="brand_email" type="email" placeholder="contact@company.com" />
          </div>
