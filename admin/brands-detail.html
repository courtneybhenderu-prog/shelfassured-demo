<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Details - Admin - ShelfAssured</title>
    
    <!-- Set page role BEFORE loading shared/api.js -->
    <script>
        window.SA_PAGE_ROLE = 'admin';
        window.SA_DISABLE_GLOBAL_GUARD = true;
        window.SA_ADMIN_READY = true;
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.5/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
<script src="../shared/admin-nav.js" data-page="brands"></script>
    <div class="min-h-screen bg-gray-100">

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Error State (if brand ID missing/invalid) -->
            <div id="error-state" class="hidden bg-white rounded-lg shadow p-6">
                <div class="text-center">
                    <p class="text-red-600 font-medium">Brand not found or access denied.</p>
                    <a href="brands.html" class="text-blue-600 hover:text-blue-800 mt-4 inline-block">← Back to Brands</a>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="bg-white rounded-lg shadow p-6">
                <div class="text-center text-gray-500">Loading brand details...</div>
            </div>

            <!-- Brand Details Content -->
            <div id="brand-content" class="hidden">
                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <div class="flex items-start justify-between">
                        <div class="flex items-center space-x-4">
                            <!-- Hidden file input for logo upload -->
                            <input type="file" id="logo-file-input" accept="image/*" class="hidden" onchange="handleLogoUpload(this)">

                            <!-- Clickable logo wrapper -->
                            <div id="logo-wrapper" onclick="document.getElementById('logo-file-input').click()"
                                 class="relative w-20 h-20 cursor-pointer group flex-shrink-0"
                                 title="Click to upload logo">
                                <img id="brand-logo" src="" alt="Brand logo"
                                     class="w-20 h-20 object-contain rounded border border-gray-200 bg-white p-2 hidden">
                                <div id="no-logo-placeholder" class="w-20 h-20 flex items-center justify-center bg-gray-100 rounded border border-gray-200 text-gray-400 text-xs text-center leading-tight hidden">
                                    No Logo<br><span class="text-gray-300 text-xs">tap to add</span>
                                </div>
                                <!-- Hover overlay -->
                                <div class="absolute inset-0 rounded bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center pointer-events-none">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                                </div>
                                <!-- Upload spinner -->
                                <div id="logo-spinner" class="absolute inset-0 rounded bg-white/80 hidden items-center justify-center">
                                    <svg class="animate-spin h-6 w-6 text-red-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 14.627 0 12 0v4a8 8 0 00-8 8H4z"></path></svg>
                                </div>
                            </div>
                            <div>
                                <h2 class="text-2xl font-bold text-gray-900" id="brand-name-display"></h2>
                                <p class="text-gray-500 mt-1" id="brand-website"></p>
                                <p class="text-sm text-gray-400 mt-1" id="brand-created"></p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <a href="" id="view-dashboard-link" target="_blank" rel="noopener"
                               class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                                View Full Dashboard
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Quick Actions</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <a href="" id="create-job-link" class="px-4 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium text-center">
                            Create Job for This Brand
                        </a>
                        <a href="brands-new.html" id="edit-brand-link" class="px-4 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 font-medium text-center">
                            Edit Brand
                        </a>
                        <a href="brands.html" class="px-4 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-medium text-center">
                            Back to All Brands
                        </a>
                        <button onclick="deleteBrand()" id="delete-brand-btn" class="px-4 py-3 bg-red-50 text-red-700 border border-red-300 rounded-lg hover:bg-red-100 font-medium text-center">
                            🗑️ Delete Brand
                        </button>
                    </div>
                </div>

                <!-- Brand Information -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-lg font-semibold text-gray-900 mb-4">Brand Information</h3>
                        <dl class="space-y-3">
                            <div>
                                <dt class="text-sm font-medium text-gray-500">Brand Name</dt>
                                <dd class="mt-1 text-sm text-gray-900" id="info-name"></dd>
                            </div>
                            <div>
                                <dt class="text-sm font-medium text-gray-500">Website</dt>
                                <dd class="mt-1 text-sm text-gray-900" id="info-website"></dd>
                            </div>
                            <div>
                                <dt class="text-sm font-medium text-gray-500">Address</dt>
                                <dd class="mt-1 text-sm text-gray-900" id="info-address"></dd>
                            </div>
                            <div>
                                <dt class="text-sm font-medium text-gray-500">Created Date</dt>
                                <dd class="mt-1 text-sm text-gray-900" id="info-created"></dd>
                            </div>
                        </dl>
                    </div>

                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-lg font-semibold text-gray-900 mb-4">Statistics</h3>
                        <div id="brand-stats" class="space-y-3">
                            <div class="text-center text-gray-500">Loading statistics...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Include shared API -->
    <script src="config.js"></script>
    <script src="../shared/api.js?v=20260305"></script>
    
    <script>
        let currentUser = null;
        let userProfile = null;
        let brandId = null;

        // Initialize page
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🔧 Brand detail page initialized');
            
            // Get brand ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            brandId = urlParams.get('id');
            
            if (!brandId) {
                showError('Brand ID not provided');
                return;
            }
            
            // Wait for Supabase to be available
            let attempts = 0;
            while (!window.supabase && attempts < 10) {
                console.log('⏳ Waiting for Supabase to load...', attempts);
                await new Promise(resolve => setTimeout(resolve, 100));
                attempts++;
            }
            
            if (!window.supabase) {
                console.error('❌ Supabase failed to load');
                window.location.href = '../auth/signin.html';
                return;
            }
            
            await checkAdminAccess();
        });

        // Check if user is admin
        async function checkAdminAccess() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                
                if (!user) {
                    alert('Please sign in to access this page');
                    window.location.href = '../auth/signin.html';
                    return;
                }

                // Get user profile to check role
                const { data: profile, error } = await supabase
                    .from('users')
                    .select('role, full_name')
                    .eq('id', user.id)
                    .single();

                if (error || !profile) {
                    console.error('Error fetching user profile:', error);
                    alert('Error loading user profile');
                    window.location.href = '../auth/signin.html';
                    return;
                }

                if (profile.role !== 'admin') {
                    alert('Access denied. Admin privileges required.');
                    window.location.href = '../admin/dashboard.html';
                    return;
                }

                currentUser = user;
                userProfile = profile;
                // User display handled by admin-nav.js
                console.log('✅ Admin access confirmed');
                
                // Load brand details after confirming admin access
                await loadBrandDetails();
                
            } catch (error) {
                console.error('Error checking admin access:', error);
                alert('Error checking permissions');
                window.location.href = '../auth/signin.html';
            }
        }

        // Load brand details
        async function loadBrandDetails() {
            try {
                console.log('🔄 Loading brand details for ID:', brandId);
                
                // Fetch brand
                const { data: brand, error: brandError } = await supabase
                    .from('brands')
                    .select('*')
                    .eq('id', brandId)
                    .single();
                
                if (brandError || !brand) {
                    console.error('❌ Error loading brand:', brandError);
                    showError('Brand not found');
                    return;
                }
                
                // Fetch brand statistics — check both junction table AND products by name, use max
                const [junctionProductsResult, nameProductsResult, storesResult, jobsResult] = await Promise.all([
                    supabase.from('brand_products').select('id', { count: 'exact', head: true }).eq('brand_id', brandId)
                        .then(r => r.error ? { count: 0 } : r),
                    supabase.from('products').select('id', { count: 'exact', head: true }).ilike('brand', brand.name)
                        .then(r => r.error ? { count: 0 } : r),
                    supabase.from('brand_stores').select('id', { count: 'exact', head: true }).eq('brand_id', brandId)
                        .then(r => r.error ? { count: 0 } : r),
                    supabase.from('jobs').select('id', { count: 'exact', head: true }).eq('brand_id', brandId)
                        .then(r => r.error ? { count: 0 } : r)
                ]);
                
                const productCount = Math.max(junctionProductsResult.count || 0, nameProductsResult.count || 0);
                const storeCount = storesResult.count || 0;
                const jobCount = jobsResult.count || 0;
                
                // Populate UI
                document.getElementById('brand-name-display').textContent = brand.name || 'Unnamed Brand';
                document.getElementById('info-name').textContent = brand.name || 'N/A';
                
                if (brand.website) {
                    document.getElementById('brand-website').innerHTML = `<a href="${escapeHtml(brand.website)}" target="_blank" rel="noopener" class="text-blue-600 hover:underline">${escapeHtml(brand.website)}</a>`;
                    document.getElementById('info-website').innerHTML = `<a href="${escapeHtml(brand.website)}" target="_blank" rel="noopener" class="text-blue-600 hover:underline">${escapeHtml(brand.website)}</a>`;
                } else {
                    document.getElementById('brand-website').textContent = 'No website';
                    document.getElementById('info-website').textContent = 'N/A';
                }
                
                if (brand.address) {
                    document.getElementById('info-address').textContent = brand.address;
                } else {
                    document.getElementById('info-address').textContent = 'N/A';
                }
                
                if (brand.created_at) {
                    const createdDate = new Date(brand.created_at).toLocaleDateString();
                    document.getElementById('brand-created').textContent = `Created: ${createdDate}`;
                    document.getElementById('info-created').textContent = createdDate;
                } else {
                    document.getElementById('brand-created').textContent = 'Created: N/A';
                    document.getElementById('info-created').textContent = 'N/A';
                }
                
                // Logo
                if (brand.logo_url) {
                    const logoImg = document.getElementById('brand-logo');
                    logoImg.src = brand.logo_url;
                    logoImg.classList.remove('hidden');
                } else {
                    document.getElementById('no-logo-placeholder').classList.remove('hidden');
                }
                
                // Update links
                document.getElementById('view-dashboard-link').href = `../dashboard/brand-client.html?brand_id=${brandId}`;
                document.getElementById('create-job-link').href = `manage-jobs.html?brand_id=${brandId}`;
                document.getElementById('edit-brand-link').href = `brands-new.html?id=${brandId}`;
                
                // Update statistics — each card links to the relevant section on the brand dashboard
                const dashBase = `../dashboard/brand-client.html?brand_id=${brandId}`;
                document.getElementById('brand-stats').innerHTML = `
                    <a href="${dashBase}#products-section" class="block bg-blue-50 rounded-lg p-4 hover:bg-blue-100 active:bg-blue-200 transition-colors cursor-pointer">
                        <div class="text-2xl font-bold text-blue-600">${productCount}</div>
                        <div class="text-sm text-gray-600">Products</div>
                        <div class="text-xs text-blue-400 mt-1">View &rarr;</div>
                    </a>
                    <a href="${dashBase}#store-map" class="block bg-green-50 rounded-lg p-4 hover:bg-green-100 active:bg-green-200 transition-colors cursor-pointer">
                        <div class="text-2xl font-bold text-green-600">${storeCount}</div>
                        <div class="text-sm text-gray-600">Stores</div>
                        <div class="text-xs text-green-400 mt-1">View &rarr;</div>
                    </a>
                    <a href="${dashBase}#jobs-section" class="block bg-purple-50 rounded-lg p-4 hover:bg-purple-100 active:bg-purple-200 transition-colors cursor-pointer">
                        <div class="text-2xl font-bold text-purple-600">${jobCount}</div>
                        <div class="text-sm text-gray-600">Jobs</div>
                        <div class="text-xs text-purple-400 mt-1">View &rarr;</div>
                    </a>
                `;
                
                // Show content
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('brand-content').classList.remove('hidden');
                
                console.log('✅ Brand details loaded successfully');
                
            } catch (error) {
                console.error('❌ Exception loading brand details:', error);
                showError('Error loading brand details');
            }
        }

        // Show error state
        function showError(message) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('brand-content').classList.add('hidden');
            const errorDiv = document.getElementById('error-state');
            errorDiv.classList.remove('hidden');
            errorDiv.querySelector('p').textContent = message;
        }

        // ── Click-to-upload logo ─────────────────────────────────────────────────
        async function handleLogoUpload(input) {
            const file = input.files[0];
            if (!file) return;

            // Validate: images only, max 5 MB
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file (JPG, PNG, WebP, etc.).');
                input.value = '';
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('Image must be under 5 MB.');
                input.value = '';
                return;
            }

            const spinner = document.getElementById('logo-spinner');
            spinner.classList.remove('hidden');
            spinner.classList.add('flex');

            try {
                const ext = file.name.split('.').pop().toLowerCase() || 'jpg';
                const fileName = `${brandId}.${ext}`;
                const filePath = `brands/${fileName}`;
                const cfg = window.SA_CONFIG || {};
                const supaUrl = cfg.SUPABASE_URL || '';
                const serviceKey = cfg.SUPABASE_SERVICE_ROLE_KEY || '';

                let publicUrl;

                if (serviceKey) {
                    // Use service role key via direct REST call to bypass storage RLS
                    const uploadRes = await fetch(
                        `${supaUrl}/storage/v1/object/brand_logos/${filePath}`,
                        {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${serviceKey}`,
                                'apikey': serviceKey,
                                'Content-Type': file.type,
                                'x-upsert': 'true'
                            },
                            body: file
                        }
                    );
                    if (!uploadRes.ok) {
                        const errText = await uploadRes.text();
                        throw new Error(errText);
                    }
                    publicUrl = `${supaUrl}/storage/v1/object/public/brand_logos/${filePath}`;
                } else {
                    // Fallback: use authenticated Supabase client (requires storage RLS policy)
                    const sc = window.saClient || supabase;
                    const { error: uploadError } = await sc.storage
                        .from('brand_logos')
                        .upload(filePath, file, { upsert: true, contentType: file.type });
                    if (uploadError) throw uploadError;
                    const { data: urlData } = sc.storage.from('brand_logos').getPublicUrl(filePath);
                    publicUrl = urlData.publicUrl;
                }

                // Save to brands table (anon key is fine for this update)
                const sc = window.saClient || supabase;
                const { error: updateError } = await sc.from('brands')
                    .update({ logo_url: publicUrl })
                    .eq('id', brandId);

                if (updateError) throw updateError;

                // Update UI immediately
                const logoImg = document.getElementById('brand-logo');
                logoImg.src = publicUrl + '?t=' + Date.now(); // cache bust
                logoImg.classList.remove('hidden');
                document.getElementById('no-logo-placeholder').classList.add('hidden');

                showToast('✓ Logo updated successfully');
            } catch (err) {
                console.error('Logo upload error:', err);
                alert('Upload failed: ' + (err.message || 'Unknown error'));
            } finally {
                spinner.classList.add('hidden');
                spinner.classList.remove('flex');
                input.value = '';
            }
        }
        window.handleLogoUpload = handleLogoUpload;

        function showToast(msg) {
            const t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;pointer-events:none';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Handle sign out
        async function handleSignOut() {
            try {
                await supabase.auth.signOut();
                window.location.href = '../auth/signin.html';
            } catch (error) {
                console.error('Error signing out:', error);
                window.location.href = '../auth/signin.html';
            }
        }

        window.handleSignOut = handleSignOut;

        // Delete brand with cascade
        async function deleteBrand() {
            const brandName = document.getElementById('brand-name-display').textContent || 'this brand';

            // Two-step confirmation: native confirm + typed name
            const step1 = confirm(
                `Delete "${brandName}"?\n\n` +
                `This will permanently remove:\n` +
                `  • The brand record\n` +
                `  • All brand-store links (map pins)\n` +
                `  • All brand-product links\n` +
                `  • All SKUs for this brand\n\n` +
                `Jobs and submissions are kept for audit history.\n\n` +
                `Click OK to continue to the final confirmation.`
            );
            if (!step1) return;

            const typedName = prompt(`To confirm, type the brand name exactly:\n\n${brandName}`);
            if (!typedName || typedName.trim() !== brandName.trim()) {
                alert('Brand name did not match. Deletion cancelled.');
                return;
            }

            const btn = document.getElementById('delete-brand-btn');
            try {
                btn.disabled = true;
                btn.textContent = 'Deleting...';

                // 1. Remove brand_stores links
                const { error: bsErr } = await supabase.from('brand_stores').delete().eq('brand_id', brandId);
                if (bsErr) console.warn('brand_stores delete warning:', bsErr.message);

                // 2. Remove brand_products links
                const { error: bpErr } = await supabase.from('brand_products').delete().eq('brand_id', brandId);
                if (bpErr) console.warn('brand_products delete warning:', bpErr.message);

                // 3. Remove SKUs for this brand
                const { error: skuErr } = await supabase.from('skus').delete().eq('brand_id', brandId);
                if (skuErr) console.warn('skus delete warning:', skuErr.message);

                // 4. Delete the brand itself
                const { error: brandErr } = await supabase.from('brands').delete().eq('id', brandId);
                if (brandErr) throw brandErr;

                alert(`"${brandName}" has been deleted.`);
                window.location.href = 'brands.html';
            } catch (err) {
                console.error('Delete brand error:', err);
                alert('Delete failed: ' + (err.message || 'Unknown error'));
                btn.disabled = false;
                btn.textContent = '🗑️ Delete Brand';
            }
        }
        window.deleteBrand = deleteBrand;
    </script>


</body>
</html>
