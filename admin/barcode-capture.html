<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scan &amp; Go - ShelfAssured</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.5/dist/umd/supabase.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        #qr-reader video { width: 100% !important; border-radius: 0.5rem; }
        #qr-reader { border: none !important; padding: 0 !important; }
        #qr-reader__scan_region { border-radius: 0.5rem; overflow: hidden; }
        #qr-reader__dashboard { display: none !important; }
        @keyframes scan {
            0% { top: 8%; }
            50% { top: 88%; }
            100% { top: 8%; }
        }
        .scan-line {
            position: absolute;
            left: 5%;
            width: 90%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #C62828, transparent);
            animation: scan 2s linear infinite;
            box-shadow: 0 0 6px #C62828;
        }
        .scan-overlay { position: absolute; inset: 0; pointer-events: none; }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .scan-success { animation: pulse-green 0.5s ease-out; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <!-- Header -->
    <div class="bg-white shadow-sm border-b sticky top-0 z-10">
        <div class="max-w-lg mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <h1 class="text-lg font-bold text-gray-900">Scan &amp; Go</h1>
                <span class="px-2 py-0.5 text-xs font-semibold text-red-600 bg-red-100 rounded-full">ADMIN</span>
            </div>
            <div class="flex items-center gap-3">
                <span id="scan-count-badge" class="text-sm text-gray-500 font-medium">0 today</span>
                <button onclick="handleSignOut()" class="text-sm text-gray-400 hover:text-gray-600">Sign Out</button>
            </div>
        </div>
    </div>

    <div class="max-w-lg mx-auto px-4 py-4 space-y-4">

        <!-- Store Selector — persists across scans -->
        <div class="bg-white rounded-xl shadow-sm p-4">
            <div class="flex items-center justify-between mb-2">
                <label class="text-sm font-semibold text-gray-700">Current Store</label>
                <span id="store-locked-badge" class="hidden text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">&#10003; Locked In</span>
            </div>
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" id="store-input"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-500 focus:border-transparent"
                        placeholder="Type store name or tap GPS..."
                        autocomplete="off">
                    <div id="store-suggestions" class="absolute z-20 w-full bg-white border border-gray-200 rounded-lg shadow-lg mt-1 hidden max-h-48 overflow-y-auto"></div>
                </div>
                <button id="gps-btn" onclick="captureGPSLocation()"
                    class="flex items-center gap-1 px-3 py-2.5 bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-lg text-sm font-medium text-gray-700 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    GPS
                </button>
            </div>
            <div id="gps-status" class="mt-1.5 text-xs text-gray-500 hidden"></div>
            <input type="hidden" id="store-lat">
            <input type="hidden" id="store-lng">
            <input type="hidden" id="store-id">
        </div>

        <!-- Scanner -->
        <div class="bg-white rounded-xl shadow-sm p-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-semibold text-gray-700">Barcode Scanner</h2>
                <div id="scanner-status-text" class="text-xs text-gray-400">Ready</div>
            </div>

            <div id="scanner-viewport" class="relative rounded-lg overflow-hidden bg-gray-900" style="min-height:220px;">
                <div id="qr-reader" class="w-full"></div>
                <div class="scan-overlay">
                    <div id="scan-line" class="scan-line hidden"></div>
                </div>
                <div id="scanner-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-white">
                    <svg class="w-14 h-14 mb-2 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8H3a2 2 0 00-2 2v10a2 2 0 002 2h3m3-14v1M9 3H5a2 2 0 00-2 2v3m14-5h-4m4 0v4"/>
                    </svg>
                    <p class="text-sm opacity-60">Tap Start Scanner</p>
                </div>
            </div>

            <div class="flex gap-2 mt-3">
                <button id="start-scan-btn" onclick="startScanner()"
                    class="flex-1 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
                    Start Scanner
                </button>
                <button id="stop-scan-btn" onclick="stopScanner()" disabled
                    class="flex-1 bg-gray-200 text-gray-400 font-semibold py-2.5 rounded-lg text-sm cursor-not-allowed">
                    Stop
                </button>
                <button onclick="toggleManualEntry()"
                    class="px-4 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg text-sm transition-colors">
                    Manual
                </button>
            </div>

            <div id="manual-entry-row" class="hidden mt-3">
                <div class="flex gap-2">
                    <input type="text" id="manual-upc" placeholder="Enter UPC manually..."
                        class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-500 focus:border-transparent"
                        inputmode="numeric" pattern="[0-9]*">
                    <button onclick="lookupManualUPC()"
                        class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 active:bg-red-800 transition-colors">
                        Look Up
                    </button>
                </div>
            </div>
        </div>

        <!-- Product Form — shown after scan -->
        <div id="product-form-section" class="bg-white rounded-xl shadow-sm p-4 hidden slide-up">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-semibold text-gray-700">Product Details</h2>
                <div id="upc-badge" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded font-mono"></div>
            </div>

            <div id="lookup-result" class="hidden mb-3 p-2.5 rounded-lg text-sm font-medium"></div>

            <form id="product-form" class="space-y-3">
                <input type="hidden" id="upc-value">
                <input type="hidden" id="existing-product-id">

                <!-- Brand -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Brand <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="text" id="brand-input" required
                            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-500 focus:border-transparent"
                            placeholder="Brand name..."
                            autocomplete="off">
                        <div id="brand-suggestions" class="absolute z-20 w-full bg-white border border-gray-200 rounded-lg shadow-lg mt-1 hidden max-h-40 overflow-y-auto"></div>
                    </div>
                    <div id="shadow-brand-notice" class="hidden mt-1 text-xs text-amber-700 bg-amber-50 px-2 py-1.5 rounded-lg">
                        &#9888; New brand — will be saved as <strong>Shadow Brand</strong> for later onboarding
                    </div>
                    <input type="hidden" id="brand-id-value">
                    <input type="hidden" id="brand-is-shadow">
                </div>

                <!-- Product Name -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Product Name <span class="text-red-500">*</span></label>
                    <input type="text" id="product-name" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-500 focus:border-transparent"
                        placeholder="Product name...">
                </div>

                <!-- Size & Category -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Size / Weight</label>
                        <input type="text" id="product-size"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-500 focus:border-transparent"
                            placeholder="e.g. 12 oz">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Category</label>
                        <select id="product-category"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-500 focus:border-transparent bg-white">
                            <option value="">Select...</option>
                            <option>Beverages</option>
                            <option>Snacks</option>
                            <option>Dairy</option>
                            <option>Frozen</option>
                            <option>Produce</option>
                            <option>Meat &amp; Seafood</option>
                            <option>Bakery</option>
                            <option>Pantry</option>
                            <option>Health &amp; Beauty</option>
                            <option>Household</option>
                            <option>Baby</option>
                            <option>Pet</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <!-- Photos -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-2">Photos</label>
                    <div class="flex gap-2 flex-wrap">
                        <button type="button" onclick="triggerPhoto('photo-shelf')"
                            class="flex items-center gap-1.5 px-3 py-2 bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-lg text-xs font-medium text-gray-700 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            Shelf Context
                        </button>
                        <button type="button" onclick="triggerPhoto('photo-product')"
                            class="flex items-center gap-1.5 px-3 py-2 bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-lg text-xs font-medium text-gray-700 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            Product Close-up
                        </button>
                    </div>
                    <input type="file" id="photo-shelf" accept="image/*" capture="environment" class="hidden" onchange="handlePhotoSelected(this, 'shelf')">
                    <input type="file" id="photo-product" accept="image/*" capture="environment" class="hidden" onchange="handlePhotoSelected(this, 'product')">
                    <div id="photo-previews" class="flex gap-2 mt-2 flex-wrap"></div>
                </div>

                <!-- Notes -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Notes (optional)</label>
                    <textarea id="product-notes" rows="2"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-500 focus:border-transparent resize-none"
                        placeholder="Shelf position, facing count, out of stock, price tag..."></textarea>
                </div>

                <div class="flex gap-2 pt-1">
                    <button type="submit"
                        class="flex-1 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-semibold py-3 rounded-lg text-sm transition-colors">
                        Save &amp; Scan Next
                    </button>
                    <button type="button" onclick="resetForm(false)"
                        class="px-4 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg text-sm transition-colors">
                        Cancel
                    </button>
                </div>
            </form>
        </div>

        <!-- Recent Scans -->
        <div class="bg-white rounded-xl shadow-sm p-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-semibold text-gray-700">Recent Scans</h2>
                <button onclick="loadRecentScans()" class="text-xs text-red-600 hover:text-red-700 font-medium">Refresh</button>
            </div>
            <div id="recent-scans" class="space-y-2 text-center text-gray-400 text-sm py-4">
                Loading...
            </div>
        </div>

    </div>

    <!-- Toast notification -->
    <div id="toast" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 hidden z-50 pointer-events-none">
        <div id="toast-inner" class="px-5 py-3 rounded-xl shadow-xl text-sm font-semibold text-white min-w-52 text-center"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-10">
        <div class="flex justify-around py-2 max-w-lg mx-auto">
            <button onclick="goToPage('barcode-capture.html')" class="flex flex-col items-center text-xs font-bold text-red-600 py-1 px-2">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8H3a2 2 0 00-2 2v10a2 2 0 002 2h3m3-14v1M9 3H5a2 2 0 00-2 2v3m14-5h-4m4 0v4"/></svg>
                Scan
            </button>
            <button onclick="goToPage('../dashboard/jobs.html')" class="flex flex-col items-center text-xs text-gray-500 hover:text-gray-700 py-1 px-2">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Jobs
            </button>
            <button onclick="goToPage('../dashboard/brands.html')" class="flex flex-col items-center text-xs text-gray-500 hover:text-gray-700 py-1 px-2">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                Brands
            </button>
            <button onclick="goToPage('../dashboard/profile.html')" class="flex flex-col items-center text-xs text-gray-500 hover:text-gray-700 py-1 px-2">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Settings
            </button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="../shared/api.js"></script>
    <script src="barcode-capture.js"></script>
</body>
</html>
