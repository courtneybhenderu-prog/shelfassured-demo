<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirming - ShelfAssured</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; background: #f9fafb; }
    .card { background: #fff; border-radius: 12px; padding: 40px 32px; text-align: center;
            max-width: 360px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
    .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb;
               border-top-color: #dc2626; border-radius: 50%;
               animation: spin .8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { margin: 0 0 8px; font-size: 18px; color: #111; }
    p  { margin: 0; font-size: 14px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Confirming your request...</h2>
    <p  id="sub">Please wait a moment.</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.5/dist/umd/supabase.min.js"></script>
  <script src="../config.js"></script>
  <script src="../shared/api.js"></script>
  <script>
  (async () => {
    const title   = document.getElementById("title");
    const sub     = document.getElementById("sub");
    const spinner = document.getElementById("spinner");
    function showError(msg) {
      spinner.style.display = "none";
      title.textContent = "Something went wrong";
      sub.innerHTML = msg + "<br><br><a href=./signin.html style=color:#dc2626>Back to sign in</a>";
    }
    // Wait up to 3 seconds for supabase client to be ready
    let waited = 0;
    while (typeof supabase === 'undefined' && waited < 3000) {
      await new Promise(r => setTimeout(r, 100));
      waited += 100;
    }
    if (typeof supabase === 'undefined') {
      showError("Could not load authentication library. Please try the link again.");
      return;
    }
    const hash         = location.hash;
    const search       = location.search;
    const params       = new URLSearchParams(hash.replace(/^#/, "") + "&" + search.replace(/^\?/, ""));
    const tokenType    = params.get("type");
    const accessToken  = params.get("access_token");
    const refreshToken = params.get("refresh_token");
    const code         = params.get("code");
    let user = null;
    try {
      if (code) {
        const { data, error } = await supabase.auth.exchangeCodeForSession(location.href);
        if (error) throw error;
        user = data && data.user;
      } else if (accessToken) {
        const { data, error } = await supabase.auth.setSession({
          access_token:  accessToken,
          refresh_token: refreshToken || "",
        });
        if (error) throw error;
        user = data && data.user;
        history.replaceState(null, "", location.pathname);
      } else {
        showError("No confirmation token found. Please use the link from your email.");
        return;
      }
    } catch (err) {
      console.error("Token exchange failed:", err);
      showError("Confirmation failed: " + (err.message || "unknown error"));
      return;
    }
    if (!user) {
      showError("Could not verify your identity. Please try the link again.");
      return;
    }
    try { if (typeof ensureProfile === "function") await ensureProfile(user); } catch(e) {}
    const base = location.origin.includes("localhost")
      ? location.origin
      : "https://courtneybhenderu-prog.github.io/shelfassured-demo";
    if (tokenType === "recovery") {
      sub.textContent   = "Redirecting to set your new password...";
      setTimeout(() => location.replace(base + "/auth/new-password.html"), 800);
      return;
    }
    const mdRole = (user.user_metadata && user.user_metadata.role) || "shelfer";
    let redirectUrl;
    if (mdRole === "admin") {
      redirectUrl = base + "/admin/dashboard.html";
    } else if (mdRole === "brand" || mdRole === "brand_client") {
      redirectUrl = base + "/dashboard/brand-client.html";
    } else {
      redirectUrl = base + "/dashboard/shelfer.html";
    }
    sub.textContent   = "Redirecting you now...";
    setTimeout(() => location.replace(redirectUrl), 800);
  })();
  </script>
</body>
</html>
