<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set New Password - ShelfAssured</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, sans-serif; display: flex;
             align-items: center; justify-content: center;
             min-height: 100vh; margin: 0; background: #f9fafb; }
      .card { background: #fff; border-radius: 12px; padding: 40px 32px;
              max-width: 400px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
      .logo { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 20px; }
      .logo span { color: #dc2626; }
      h1 { font-size: 22px; font-weight: 700; color: #111; margin: 0 0 6px; }
      .sub { font-size: 14px; color: #6b7280; margin: 0 0 24px; }
      label { display: block; font-size: 13px; font-weight: 600; color: #374151;
              margin-bottom: 4px; margin-top: 16px; }
      input { width: 100%; padding: 11px 14px; border: 1px solid #d1d5db;
              border-radius: 8px; font-size: 15px; outline: none;
              transition: border-color .15s; }
      input:focus { border-color: #dc2626; }
      button { width: 100%; padding: 12px; background: #dc2626; color: #fff;
               border: none; border-radius: 8px; font-size: 15px;
               font-weight: 600; cursor: pointer; margin-top: 24px;
               transition: background .15s; }
      button:hover { background: #b91c1c; }
      button:disabled { background: #9ca3af; cursor: not-allowed; }
      .msg { margin-top: 14px; font-size: 14px; color: #6b7280; text-align: center; }
      .msg.error { color: #dc2626; }
      .msg.success { color: #16a34a; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">Shelf<span>Assured</span></div>
      <h1>Set a new password</h1>
      <p class="sub">Choose a strong password for your account.</p>
      <label for="pw1">New password</label>
      <input id="pw1" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
      <label for="pw2">Confirm new password</label>
      <input id="pw2" type="password" placeholder="Repeat your password" autocomplete="new-password" />
      <button id="saveBtn">Save password</button>
      <p id="msg" class="msg"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.5/dist/umd/supabase.min.js"></script>
    <script src="../config.js"></script>
    <script src="../shared/api.js"></script>
    <script>
      const msgEl   = document.getElementById('msg');
      const pw1     = document.getElementById('pw1');
      const pw2     = document.getElementById('pw2');
      const saveBtn = document.getElementById('saveBtn');

      function setMsg(text, type) {
        msgEl.textContent = text;
        msgEl.className = 'msg ' + (type || '');
      }

      saveBtn.addEventListener('click', async () => {
        setMsg('', '');
        if (!pw1.value) { setMsg('Please enter a password.', 'error'); return; }
        if (pw1.value.length < 6) { setMsg('Password must be at least 6 characters.', 'error'); return; }
        if (pw1.value !== pw2.value) { setMsg('Passwords do not match.', 'error'); return; }

        saveBtn.disabled = true;
        setMsg('Saving...', '');

        // Session must already be set by confirmed.html before this page loads
        const { data: { user }, error: uErr } = await supabase.auth.getUser();
        if (!user || uErr) {
          setMsg('Session expired. Please request a new password reset link.', 'error');
          saveBtn.disabled = false;
          return;
        }

        const { error } = await supabase.auth.updateUser({ password: pw1.value });
        if (error) {
          setMsg('Could not update password: ' + error.message, 'error');
          saveBtn.disabled = false;
        } else {
          setMsg('Password updated successfully! Redirecting to sign in...', 'success');
          setTimeout(() => location.replace('./signin.html'), 1500);
        }
      });
    </script>
  </body>
</html>
